<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="나는누구? — 자기소개서·경력(근무·기술·학력) 관리" />
    <title>나는누구?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Serif+KR:wght@500;600&family=Sora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/css/project-shell.css?v=portal3" />
    <link rel="stylesheet" href="/who-are-you/css/app.css?v=portal3" />
  </head>
  <body class="project-app theme-who-are-you">
    <p class="app-banner">
      <span class="app-banner__brand">
        <span class="app-banner__icon" aria-hidden="true">👤</span>
        <span class="app-banner__title" id="app-banner-title">나는누구?</span>
      </span>
      <span class="app-banner__tagline" id="app-banner-tagline">자기소개서·SW기술자형 경력 — 한글 문서를 구조화</span>
      <span class="app-banner__meta">🔒 포털 도메인 저장 · JSON 백업 · 미리보기</span>
    </p>
    <div class="project-nav-backdrop" id="project-nav-backdrop" hidden aria-hidden="true"></div>
    <div class="app-shell project-shell" id="app-shell">
      <aside class="sidebar project-sidebar" id="sidebar" aria-label="경력 메뉴">
        <div class="sidebar__head project-sidebar__head">
          <div class="logo-block project-logo">
            <h1>
              <span class="logo-block__icon project-logo__icon" aria-hidden="true">👤</span>
              <span class="logo-block__text project-logo__text" id="app-brand-title">나는누구?</span>
            </h1>
            <p class="logo-block__sub project-logo__sub" id="app-brand-sub">경력·자소서 관리</p>
          </div>
        </div>
        <nav class="sidebar-nav project-sidebar-nav" aria-label="주 메뉴">
          <button type="button" class="nav-item project-nav-item is-active" data-view="dashboard">
            <span class="nav-item__icon" aria-hidden="true">📊</span>
            <span class="nav-item__label">대시보드</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="profile">
            <span class="nav-item__icon" aria-hidden="true">🪪</span>
            <span class="nav-item__label">인적·프로필</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="employments">
            <span class="nav-item__icon" aria-hidden="true">🏢</span>
            <span class="nav-item__label">근무경력</span>
            <span class="nav-item__badge" id="nav-count-employments">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="projects">
            <span class="nav-item__icon" aria-hidden="true">💼</span>
            <span class="nav-item__label">기술경력</span>
            <span class="nav-item__badge" id="nav-count-projects">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="educations">
            <span class="nav-item__icon" aria-hidden="true">🎓</span>
            <span class="nav-item__label">학력</span>
            <span class="nav-item__badge" id="nav-count-educations">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="certifications">
            <span class="nav-item__icon" aria-hidden="true">📜</span>
            <span class="nav-item__label">자격·교육</span>
            <span class="nav-item__badge" id="nav-count-certs">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="documents">
            <span class="nav-item__icon" aria-hidden="true">📝</span>
            <span class="nav-item__label">자기소개서</span>
            <span class="nav-item__badge" id="nav-count-documents">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="preview">
            <span class="nav-item__icon" aria-hidden="true">🖨</span>
            <span class="nav-item__label">미리보기</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="import">
            <span class="nav-item__icon" aria-hidden="true">📥</span>
            <span class="nav-item__label">가져오기</span>
          </button>
        </nav>
        <a class="nav-item nav-item--hub project-nav-item project-nav-item--hub" href="/">🏠 포털 홈</a>
        <p class="sidebar-note project-sidebar-note">
          <a href="https://career.sw.or.kr" target="_blank" rel="noopener">career.sw.or.kr</a> 항목 구조를 참고했습니다. 증빙·기업확인은 별도입니다.
        </p>
        <button type="button" class="sidebar-rail project-sidebar-rail" id="sidebar-toggle" aria-expanded="true" aria-controls="sidebar" title="접기">
          <span class="sidebar-rail__label">접기</span>
          <span class="sidebar-rail__icon" aria-hidden="true">‹</span>
        </button>
      </aside>
      <div class="main project-main">
        <div class="toolbar project-toolbar">
          <button type="button" class="btn project-nav-toggle" id="sidebar-toggle-toolbar" aria-controls="sidebar" title="메뉴">☰</button>
          <a class="btn btn--hub" href="/">← 포털</a>
          <input type="search" id="search" class="toolbar-search" placeholder="🔍 제목·회사·프로젝트 검색…" hidden />
          <button type="button" class="btn" id="btn-export">JSON보내기</button>
          <button type="button" class="btn btn--primary" id="btn-add">＋ 항목 추가</button>
        </div>
        <div class="content project-content" id="content"></div>
      </div>
    </div>
    <script>
      (function () {
        try {
          if (localStorage.getItem("who-are-you-sidebar-collapsed") === "1") {
            document.documentElement.classList.add("project-sidebar-collapsed-boot");
          }
        } catch (e) {}
      })();
    </script>
    <script src="/shared/js/project-shell.js?v=portal3"></script>
    <script src="/who-are-you/js/db.js?v=portal3"></script>
    <script src="/who-are-you/js/app.js?v=portal3"></script>
  </body>
</html>
