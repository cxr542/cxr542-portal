<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="너는몇점? — 영화·시리즈·책·웹툰 나만의 평점 (왓챠피디아 스타일)"
    />
    <title>너는몇점?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/css/project-shell.css?v=portal2" />
    <link rel="stylesheet" href="/how-many-points/css/app.css?v=portal2" />
  </head>
  <body class="project-app theme-how-many-points">
    <p class="app-banner">
      <span class="app-banner__brand">
        <span class="app-banner__icon" aria-hidden="true">⭐</span>
        <span class="app-banner__title" id="app-banner-title">너는몇점?</span>
      </span>
      <span class="app-banner__tagline" id="app-banner-tagline">영화·시리즈·책·웹툰 — 나만의 평점 아카이브</span>
      <span class="app-banner__meta">🔒 이 포털 도메인에 저장 · JSON·왓챠 CSV 백업</span>
    </p>
    <div class="project-nav-backdrop" id="project-nav-backdrop" hidden aria-hidden="true"></div>
    <div class="app-shell project-shell" id="app-shell">
      <aside class="sidebar project-sidebar" id="sidebar" aria-label="서비스 메뉴">
        <div class="sidebar__head project-sidebar__head">
          <div class="logo-block project-logo">
            <h1>
              <span class="logo-block__icon project-logo__icon" aria-hidden="true">⭐</span>
              <span class="logo-block__text project-logo__text" id="app-brand-title">너는몇점?</span>
            </h1>
            <p class="logo-block__sub project-logo__sub" id="app-brand-sub">내 평가 라이브러리</p>
          </div>
        </div>
        <nav class="sidebar-nav project-sidebar-nav" aria-label="주 메뉴">
          <button type="button" class="nav-item project-nav-item is-active" data-view="library" data-type-filter="all" title="전체">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📋</span>
            <span class="nav-item__label project-nav-item__label">내 평가</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-all">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="library" data-type-filter="movie" title="영화">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">🎬</span>
            <span class="nav-item__label project-nav-item__label">영화</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-movie">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="library" data-type-filter="series" title="시리즈">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📺</span>
            <span class="nav-item__label project-nav-item__label">시리즈</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-series">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="library" data-type-filter="book" title="책">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📚</span>
            <span class="nav-item__label project-nav-item__label">책</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-book">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="library" data-type-filter="webtoon" title="웹툰">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">💬</span>
            <span class="nav-item__label project-nav-item__label">웹툰</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-webtoon">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="stats" title="통계">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📊</span>
            <span class="nav-item__label project-nav-item__label">통계</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="edit" title="평가하기">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">✏️</span>
            <span class="nav-item__label project-nav-item__label">평가하기</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="import" title="가져오기">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📥</span>
            <span class="nav-item__label project-nav-item__label">가져오기</span>
          </button>
        </nav>
        <a class="nav-item nav-item--hub project-nav-item project-nav-item--hub" href="/" title="포털 홈">
          <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">🏠</span>
          <span class="nav-item__label project-nav-item__label">포털 홈</span>
        </a>
        <p class="sidebar-note project-sidebar-note">왓챠피디아 CSV는 <strong>가져오기</strong> 메뉴 안내를 따르세요.</p>
        <button type="button" class="sidebar-rail project-sidebar-rail" id="sidebar-toggle" aria-expanded="true" aria-controls="sidebar" title="메뉴 접기">
          <span class="sidebar-rail__label project-sidebar-rail__label">접기</span>
          <span class="sidebar-rail__icon project-sidebar-rail__icon" aria-hidden="true">‹</span>
        </button>
      </aside>
      <div class="main project-main">
        <div class="toolbar project-toolbar">
          <button type="button" class="btn project-nav-toggle sidebar-toggle-toolbar" id="sidebar-toggle-toolbar" aria-expanded="false" aria-controls="sidebar" title="메뉴">☰</button>
          <a class="btn btn--hub" href="/">← 포털</a>
          <input type="search" id="search" placeholder="🔍 제목·리뷰 검색…" autocomplete="off" />
          <select class="toolbar-select" id="sort-select" title="정렬">
            <option value="recent">최근 평가</option>
            <option value="rating-desc">평점 높은 순</option>
            <option value="rating-asc">평점 낮은 순</option>
            <option value="title">제목순</option>
          </select>
          <button type="button" class="btn" id="btn-export">JSON보내기</button>
          <label class="btn">
            JSON 가져오기
            <input type="file" id="import-json-toolbar" accept="application/json,.json" hidden />
          </label>
          <button type="button" class="btn btn--primary" id="btn-new">✨ 평가하기</button>
        </div>
        <nav class="type-filter" id="type-filter" hidden></nav>
        <div class="content project-content" id="content"></div>
      </div>
    </div>
    <script>
      (function () {
        try {
          if (localStorage.getItem("how-many-points-sidebar-collapsed") === "1") {
            document.documentElement.classList.add("project-sidebar-collapsed-boot");
          }
        } catch (e) {}
      })();
    </script>
    <script src="/shared/js/project-shell.js?v=portal2"></script>
    <script src="/how-many-points/js/db.js?v=portal2"></script>
    <script src="/how-many-points/js/import-watcha.js?v=portal2"></script>
    <script src="/how-many-points/js/app.js?v=portal2"></script>
  </body>
</html>
