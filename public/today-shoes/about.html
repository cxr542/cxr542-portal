    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.35rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 0.75rem; }
    ul { margin: 0; padding-left: 1.1rem; }
    a { color: var(--accent); }
    .btn { display: inline-block; padding: 0.55rem 1rem; border-radius: 10px; font-weight: 600; text-decoration: none; background: var(--accent); color: #fff; margin-right: 0.5rem; }
    .btn--ghost { background: transparent; border: 2px solid var(--border); color: var(--ink); }
