<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="idea-bank — 서비스 개발 전 떠오른 생각을 정리하는 로컬 아이디어 노트"
    />
    <title>idea-bank · 아이디어 노트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/css/project-shell.css?v=portal1" />
    <link rel="stylesheet" href="/idea-bank/css/app.css?v=portal1" />
  </head>
  <body class="project-app theme-idea-bank">
    <p class="app-banner">
      <span class="app-banner__brand">
        <span class="app-banner__icon" aria-hidden="true">💡</span>
        <span class="app-banner__title" id="app-banner-title">idea-bank</span>
      </span>
      <span class="app-banner__tagline" id="app-banner-tagline">서비스 만들기 전, 생각을 모아 두는 아이디어 노트</span>
      <span class="app-banner__meta">🔒 이 포털 도메인에 저장 · JSON 백업 가능</span>
    </p>
    <div
      class="project-nav-backdrop"
      id="project-nav-backdrop"
      hidden
      aria-hidden="true"
    ></div>
    <div class="app-shell project-shell" id="app-shell">
      <aside class="sidebar project-sidebar" id="sidebar" aria-label="서비스 메뉴">
        <div class="sidebar__head project-sidebar__head">
          <div class="logo-block project-logo">
            <h1>
              <span class="logo-block__icon project-logo__icon" aria-hidden="true">💡</span>
              <span class="logo-block__text project-logo__text" id="app-brand-title">idea-bank</span>
            </h1>
            <p class="logo-block__sub project-logo__sub" id="app-brand-sub">개발 전 아이디어 노트</p>
          </div>
        </div>
        <nav class="sidebar-nav project-sidebar-nav" aria-label="주 메뉴">
          <button type="button" class="nav-item project-nav-item is-active" data-view="list" title="전체 아이디어">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📋</span>
            <span class="nav-item__label project-nav-item__label">전체 아이디어</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-all" aria-label="아이디어 개수">0</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="sketch" title="아이디어 쓰기">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">✏️</span>
            <span class="nav-item__label project-nav-item__label">아이디어 쓰기</span>
          </button>
          <button type="button" class="nav-item project-nav-item" data-view="pinned" title="고정함">
            <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">📌</span>
            <span class="nav-item__label project-nav-item__label">고정함</span>
            <span class="nav-item__badge project-nav-item__badge" id="nav-count-pinned" aria-label="고정 개수">0</span>
          </button>
        </nav>
        <a class="nav-item nav-item--hub project-nav-item project-nav-item--hub" href="/" title="cxr542 포털 홈으로">
          <span class="nav-item__icon project-nav-item__icon" aria-hidden="true">🏠</span>
          <span class="nav-item__label project-nav-item__label">포털 홈</span>
        </a>
        <p class="sidebar-note project-sidebar-note">
          📝 승격 후에도 노트에 남습니다(자동 삭제 없음). 상단 소개 문구 옆 ✏️ 또는 더블클릭으로 수정할 수 있습니다.
        </p>
        <button
          type="button"
          class="sidebar-rail project-sidebar-rail"
          id="sidebar-toggle"
          aria-expanded="true"
          aria-controls="sidebar"
          title="메뉴 접기"
        >
          <span class="sidebar-rail__label project-sidebar-rail__label">접기</span>
          <span class="sidebar-rail__icon project-sidebar-rail__icon" aria-hidden="true">‹</span>
        </button>
      </aside>
      <div class="main project-main">
        <div class="toolbar project-toolbar">
          <button
            type="button"
            class="btn project-nav-toggle sidebar-toggle-toolbar"
            id="sidebar-toggle-toolbar"
            aria-expanded="false"
            aria-controls="sidebar"
            title="메뉴"
          >
            ☰
          </button>
          <a class="btn btn--hub" href="/" title="cxr542 포털 홈">← 포털</a>
          <input type="search" id="search" placeholder="🔍 아이디어 검색…" autocomplete="off" />
          <button type="button" class="btn" id="btn-export">JSON보내기</button>
          <label class="btn">
            JSON 가져오기
            <input type="file" id="import-file" accept="application/json,.json" hidden />
          </label>
          <button type="button" class="btn btn--primary" id="btn-new">✨ 새 아이디어</button>
        </div>
        <nav class="cat-filter" id="cat-filter"></nav>
        <div class="content project-content" id="content"></div>
      </div>
    </div>
    <script>
      (function () {
        try {
          if (localStorage.getItem("idea-bank-sidebar-collapsed") === "1") {
            document.documentElement.classList.add("project-sidebar-collapsed-boot");
          }
        } catch (e) {}
      })();
    </script>
    <script src="/shared/js/project-shell.js?v=portal1"></script>
    <script src="/idea-bank/js/db.js?v=portal1"></script>
    <script src="/idea-bank/js/hub-checklist.js?v=portal1"></script>
    <script src="/idea-bank/js/app.js?v=portal1"></script>
  </body>
</html>
