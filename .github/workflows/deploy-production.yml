name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_production:
    runs-on: ubuntu-latest
    # environment: production  — 승인 UI 없을 때 배포가 멈춤. 필요 시 Settings → Environments에서 production 생성 후 주석 해제
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Deploy production to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_Vp0kQleFtc5U7n4UQi8U7Ky9
          VERCEL_PROJECT_ID: prj_99WcsURX5Ws8FvWSTDp6uriQK6UQ
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | grep -Eo 'https://[^ ]+\.vercel\.app' | head -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to parse production deployment URL."
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check root page
        run: curl -fsS "${{ steps.vercel_deploy.outputs.deploy_url }}" > /dev/null

      - name: Publish deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.vercel_deploy.outputs.deploy_url }}" >> "$GITHUB_STEP_SUMMARY"
